name: Daily good-morning weather

on:
  schedule:
    # GitHub cron is in UTC. 23:00 UTC = 07:00 Asia/Taipei (next day).
    # Note: GitHub may delay scheduled runs by a few minutes.
    - cron: "0 23 * * *"
  workflow_dispatch: {}   # lets you trigger a test run manually from the Actions tab

permissions:
  contents: write   # needed to commit the generated image back to the repo

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install requests pillow
          sudo apt-get update -qq && sudo apt-get install -y -qq fonts-noto-cjk

      - name: Generate weather card
        run: python morning_weather.py generate

      - name: Commit image to repo (this is what hosts it for LINE)
        run: |
          git config user.name "weather-bot"
          git config user.email "actions@github.com"
          git add images/
          git commit -m "Weather card $(TZ=Asia/Taipei date +%F)" || echo "nothing to commit"
          git push

      - name: Wait for raw.githubusercontent.com to serve the new file
        run: sleep 20

      - name: Push to LINE group
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_GROUP_ID: ${{ secrets.LINE_GROUP_ID }}
          IMAGE_BASE_URL: https://raw.githubusercontent.com/${{ github.repository }}/main/images
        run: python morning_weather.py send
